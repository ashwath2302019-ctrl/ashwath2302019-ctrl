<svg width="1200" height="260" xmlns="http://www.w3.org/2000/svg">

<style>

.background {
    fill:#0d1117;
}

.title {
    font-family: 'Segoe UI', sans-serif;
    font-size: 58px;
    font-weight: 700;
    fill: #ffffff;
    animation: pulse 3s ease-in-out infinite;
}

.subtitle {
    font-family: 'Segoe UI', sans-serif;
    font-size: 18px;
    fill: #c9d1d9;
    letter-spacing: 1px;
}

.line {
    stroke: #58a6ff;
    stroke-width: 2;
    opacity: .7;
}

.dot {
    fill: #58a6ff;
    animation: pulseDot 2s infinite;
}

@keyframes pulse {

  0% {
      opacity: .8;
      filter:
      drop-shadow(0 0 5px #58a6ff);
  }

  50% {
      opacity: 1;
      filter:
      drop-shadow(0 0 10px #58a6ff)
      drop-shadow(0 0 25px #58a6ff)
      drop-shadow(0 0 50px #58a6ff);
  }

  100% {
      opacity: .8;
      filter:
      drop-shadow(0 0 5px #58a6ff);
  }
}

@keyframes pulseDot {

  0% {
      r:5;
      opacity:.5;
  }

  50% {
      r:8;
      opacity:1;
  }

  100% {
      r:5;
      opacity:.5;
  }
}

</style>

<rect class="background" width="100%" height="100%" />

<line x1="120" y1="130" x2="330" y2="130" class="line"/>
<line x1="870" y1="130" x2="1080" y2="130" class="line"/>

<circle cx="100" cy="130" r="5" class="dot"/>
<circle cx="1100" cy="130" r="5" class="dot"/>

<text x="50%" y="120"
      text-anchor="middle"
      class="title">
ASHWATH S K
</text>

<text x="50%" y="165"
      text-anchor="middle"
      class="subtitle">
FULL STACK DEVELOPER IN PROGRESS • ECE STUDENT
</text>

<text x="50%" y="195"
      text-anchor="middle"
      class="subtitle">
HTML • CSS • JAVASCRIPT • REACT • NODE.JS • MONGODB
</text>

<text x="50%" y="225"
      text-anchor="middle"
      class="subtitle">
LEARNING • BUILDING • IMPROVING ⚡
</text>

</svg>

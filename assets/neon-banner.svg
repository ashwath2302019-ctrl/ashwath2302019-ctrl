<svg width="1200" height="260" xmlns="http://www.w3.org/2000/svg">

<style>

.background {
    fill:#0d1117;
}

.title {
    font-family:'Segoe UI',sans-serif;
    font-size:58px;
    font-weight:700;
    fill:#ffffff;
    animation:pulse 3s ease-in-out infinite;
}

.subtitle {
    font-family:'Segoe UI',sans-serif;
    font-size:18px;
    fill:#c9d1d9;
    letter-spacing:1px;
}

.line {
    stroke:#58a6ff;
    stroke-width:2;
    opacity:.7;
}

.dot {
    fill:#58a6ff;
    animation:pulseDot 2s infinite;
}

.viewBorder{
    fill:#111827;
    stroke:#58a6ff;
    stroke-width:1.5;
    animation:borderGlow 5s linear infinite;
}

.counter{
    font-family:monospace;
    font-size:24px;
    font-weight:bold;
    fill:#ffffff;
}

.arrow{
    fill:#00ff88;
    animation:blink 1s infinite;
}

@keyframes borderGlow{
    0%{stroke:#58a6ff;}
    33%{stroke:#00ffff;}
    66%{stroke:#a855f7;}
    100%{stroke:#58a6ff;}
}

@keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:.2;}
}

@keyframes pulse {

  0% {
      opacity:.8;
      filter:
      drop-shadow(0 0 5px #58a6ff);
  }

  50% {
      opacity:1;
      filter:
      drop-shadow(0 0 10px #58a6ff)
      drop-shadow(0 0 25px #58a6ff)
      drop-shadow(0 0 50px #58a6ff);
  }

  100% {
      opacity:.8;
      filter:
      drop-shadow(0 0 5px #58a6ff);
  }
}

@keyframes pulseDot {

  0% {
      r:5;
      opacity:.5;
  }

  50% {
      r:8;
      opacity:1;
  }

  100% {
      r:5;
      opacity:.5;
  }
}

</style>

<rect class="background" width="100%" height="100%" />

<!-- Side Lines -->

<line x1="120" y1="130" x2="330" y2="130" class="line"/>
<line x1="870" y1="130" x2="1080" y2="130" class="line"/>

<circle cx="100" cy="130" r="5" class="dot"/>
<circle cx="1100" cy="130" r="5" class="dot"/>

<!-- Profile Views Dashboard -->

<g transform="translate(930,20)">

    <rect width="240"
          height="70"
          rx="10"
          class="viewBorder"/>

    <text x="15"
          y="22"
          fill="#8b949e"
          font-family="monospace"
          font-size="12">
        PROFILE VIEWS
    </text>

    <!-- Animated Counter -->

    <g transform="translate(15,50)">

      <text x="0" y="0" class="counter" opacity="1">
        0
        <animate attributeName="opacity"
                 values="1;0;0;0;0;0"
                 dur="8s"
                 repeatCount="indefinite"/>
      </text>

      <text x="0" y="0" class="counter" opacity="0">
        350
        <animate attributeName="opacity"
                 values="0;1;0;0;0;0"
                 dur="8s"
                 repeatCount="indefinite"/>
      </text>

      <text x="0" y="0" class="counter" opacity="0">
        750
        <animate attributeName="opacity"
                 values="0;0;1;0;0;0"
                 dur="8s"
                 repeatCount="indefinite"/>
      </text>

      <text x="0" y="0" class="counter" opacity="0">
        1200
        <animate attributeName="opacity"
                 values="0;0;0;1;0;0"
                 dur="8s"
                 repeatCount="indefinite"/>
      </text>

      <text x="0" y="0" class="counter" opacity="0">
        1500
        <animate attributeName="opacity"
                 values="0;0;0;0;1;1"
                 dur="8s"
                 repeatCount="indefinite"/>
      </text>

    </g>

    <text x="105"
          y="50"
          class="arrow"
          font-family="monospace"
          font-size="20">
      ▲
    </text>

</g>

<!-- Main Title -->

<text x="50%"
      y="120"
      text-anchor="middle"
      class="title">
ASHWATH S K
</text>

<text x="50%"
      y="165"
      text-anchor="middle"
      class="subtitle">
FULL STACK DEVELOPER IN PROGRESS • ECE STUDENT
</text>

<text x="50%"
      y="195"
      text-anchor="middle"
      class="subtitle">
HTML • CSS • JAVASCRIPT • REACT • NODE.JS • MONGODB
</text>

<text x="50%"
      y="225"
      text-anchor="middle"
      class="subtitle">
LEARNING • BUILDING • IMPROVING ⚡
</text>

</svg>

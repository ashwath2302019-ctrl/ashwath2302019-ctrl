<svg width="1200" height="260" xmlns="http://www.w3.org/2000/svg">

<style>

.background {
    fill:#0d1117;
}

.title {
    font-family: 'Segoe UI', sans-serif;
    font-size: 56px;
    font-weight: bold;
    fill: #00ffff;

    animation: pulse 2.5s ease-in-out infinite;
}

.subtitle {
    font-family: monospace;
    font-size: 18px;
    fill: #ffffff;
}

.line {
    stroke: #00ffff;
    stroke-width: 2;
    opacity: .7;
}

.dot {
    fill: #00ffff;
    animation: pulseDot 1.8s infinite;
}

@keyframes pulse {

  0% {
      opacity: .6;
      filter: drop-shadow(0 0 5px #00ffff);
  }

  50% {
      opacity: 1;
      filter:
      drop-shadow(0 0 10px #00ffff)
      drop-shadow(0 0 20px #00ffff)
      drop-shadow(0 0 40px #00ffff);
  }

  100% {
      opacity: .6;
      filter: drop-shadow(0 0 5px #00ffff);
  }
}

@keyframes pulseDot {

  0% {
      r:5;
      opacity:.5;
  }

  50% {
      r:8;
      opacity:1;
  }

  100% {
      r:5;
      opacity:.5;
  }
}

</style>

<rect class="background" width="100%" height="100%" />

<line x1="150" y1="130" x2="350" y2="130" class="line"/>
<line x1="850" y1="130" x2="1050" y2="130" class="line"/>

<circle cx="130" cy="130" r="5" class="dot"/>
<circle cx="1070" cy="130" r="5" class="dot"/>

<text x="50%" y="120"
      text-anchor="middle"
      class="title">
ASHWATH OS
</text>

<text x="50%" y="165"
      text-anchor="middle"
      class="subtitle">
FULL STACK DEVELOPER IN PROGRESS
</text>

<text x="50%" y="195"
      text-anchor="middle"
      class="subtitle">
HTML • CSS • JAVASCRIPT • REACT • NODE.JS
</text>

<text x="50%" y="225"
      text-anchor="middle"
      class="subtitle">
STATUS : ONLINE ●
</text>

</svg>

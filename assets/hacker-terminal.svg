<svg width="1200" height="380" xmlns="http://www.w3.org/2000/svg">

<style>

.background{
fill:#0d1117;
}

.window{
fill:#161b22;
stroke:#30363d;
stroke-width:2;
rx:15;
}

.titlebar{
fill:#21262d;
}

.red{fill:#ff5f56;}
.yellow{fill:#ffbd2e;}
.green{fill:#27c93f;}

.text{
font-family:monospace;
font-size:22px;
fill:#58a6ff;
}

.success{
fill:#3fb950;
font-family:monospace;
font-size:22px;
}

.cursor{
animation:blink 1s infinite;
}

@keyframes blink{
0%,50%{opacity:1;}
51%,100%{opacity:0;}
}

.line1{
opacity:0;
animation:show1 1s forwards;
}

.line2{
opacity:0;
animation:show2 3s forwards;
}

.line3{
opacity:0;
animation:show3 5s forwards;
}

.line4{
opacity:0;
animation:show4 7s forwards;
}

.line5{
opacity:0;
animation:show5 9s forwards;
}

.line6{
opacity:0;
animation:show6 11s forwards;
}

@keyframes show1{
to{opacity:1;}
}

@keyframes show2{
to{opacity:1;}
}

@keyframes show3{
to{opacity:1;}
}

@keyframes show4{
to{opacity:1;}
}

@keyframes show5{
to{opacity:1;}
}

@keyframes show6{
to{opacity:1;}
}

</style>

<rect width="100%" height="100%" class="background"/>

<rect x="120" y="40" width="960" height="300" class="window"/>

<rect x="120" y="40" width="960" height="40" class="titlebar"/>

<circle cx="150" cy="60" r="8" class="red"/>
<circle cx="180" cy="60" r="8" class="yellow"/>
<circle cx="210" cy="60" r="8" class="green"/>

<text x="250" y="67"
      fill="#c9d1d9"
      font-size="16"
      font-family="monospace">
terminal@ashwath
</text>

<text x="160" y="120" class="text line1">
&gt; whoami
</text>

<text x="160" y="155" class="success line2">
ASHWATH S K
</text>

<text x="160" y="195" class="text line3">
&gt; current_focus
</text>

<text x="160" y="230" class="success line4">
FULL STACK DEVELOPMENT
</text>

<text x="160" y="270" class="text line5">
&gt; mission_status
</text>

<text x="160" y="305" class="success line6">
LEARNING • BUILDING • IMPROVING ⚡
</text>

<rect x="650"
      y="288"
      width="12"
      height="22"
      fill="#58a6ff"
      class="cursor"/>

</svg>

<svg width="1200" height="350" xmlns="http://www.w3.org/2000/svg">

<style>

.background{
fill:#0d1117;
}

.line{
stroke:#30363d;
stroke-width:2;
}

.node{
fill:#58a6ff;
animation:pulse 2s infinite;
}

.centerNode{
fill:#58a6ff;
animation:corePulse 3s infinite;
}

.label{
fill:#ffffff;
font-family:'Segoe UI',sans-serif;
font-size:18px;
}

.name{
fill:#ffffff;
font-family:'Segoe UI',sans-serif;
font-size:28px;
font-weight:bold;
}

.packet{
fill:#58a6ff;
animation:travel 4s linear infinite;
}

.packet2{
fill:#58a6ff;
animation:travel2 5s linear infinite;
}

.packet3{
fill:#58a6ff;
animation:travel3 6s linear infinite;
}

@keyframes pulse{
0%,100%{
opacity:.5;
}
50%{
opacity:1;
}
}

@keyframes corePulse{
0%,100%{
r:30;
filter:drop-shadow(0 0 5px #58a6ff);
}
50%{
r:36;
filter:
drop-shadow(0 0 10px #58a6ff)
drop-shadow(0 0 20px #58a6ff)
drop-shadow(0 0 40px #58a6ff);
}
}

@keyframes travel{
0%{
transform:translate(150px,100px);
}
100%{
transform:translate(600px,175px);
}
}

@keyframes travel2{
0%{
transform:translate(150px,250px);
}
100%{
transform:translate(600px,175px);
}
}

@keyframes travel3{
0%{
transform:translate(1050px,175px);
}
100%{
transform:translate(600px,175px);
}
}

</style>

<rect width="100%" height="100%" class="background"/>

<!-- Connections -->

<line x1="150" y1="100" x2="600" y2="175" class="line"/>
<line x1="150" y1="250" x2="600" y2="175" class="line"/>
<line x1="1050" y1="100" x2="600" y2="175" class="line"/>
<line x1="1050" y1="250" x2="600" y2="175" class="line"/>
<line x1="1050" y1="175" x2="600" y2="175" class="line"/>

<!-- Left Nodes -->

<circle cx="150" cy="100" r="10" class="node"/>
<circle cx="150" cy="250" r="10" class="node"/>

<!-- Right Nodes -->

<circle cx="1050" cy="100" r="10" class="node"/>
<circle cx="1050" cy="175" r="10" class="node"/>
<circle cx="1050" cy="250" r="10" class="node"/>

<!-- Center -->

<circle cx="600" cy="175" r="30" class="centerNode"/>

<!-- Animated Data Packets -->

<circle r="5" class="packet"/>
<circle r="5" class="packet2"/>
<circle r="5" class="packet3"/>

<!-- Labels -->

<text x="150" y="75" text-anchor="middle" class="label">
HTML
</text>

<text x="150" y="285" text-anchor="middle" class="label">
JavaScript
</text>

<text x="1050" y="75" text-anchor="middle" class="label">
React.js
</text>

<text x="1050" y="175" text-anchor="middle" class="label">
Node.js
</text>

<text x="1050" y="285" text-anchor="middle" class="label">
MongoDB
</text>

<text x="600" y="182" text-anchor="middle" class="name">
ASHWATH
</text>

<text x="600"
      y="330"
      text-anchor="middle"
      fill="#8b949e"
      font-size="16"
      font-family="Segoe UI">
LEARNING • BUILDING • IMPROVING ⚡
</text>

</svg>

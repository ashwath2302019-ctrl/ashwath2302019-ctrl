<svg width="1200" height="320" xmlns="http://www.w3.org/2000/svg">

<style>

.background{
fill:#0d1117;
}

/* Rotating Rings */

.ring1{
fill:none;
stroke-width:4;
transform-origin:600px 160px;
animation:rotateCW 20s linear infinite, colorShift 8s ease-in-out infinite;
}

.ring2{
fill:none;
stroke-width:3;
transform-origin:600px 160px;
animation:rotateCCW 12s linear infinite, colorShift 8s ease-in-out infinite;
}

.ring3{
fill:none;
stroke-width:2;
transform-origin:600px 160px;
animation:rotateCW 7s linear infinite, colorShift 8s ease-in-out infinite;
}

@keyframes rotateCW{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

@keyframes rotateCCW{
from{transform:rotate(360deg);}
to{transform:rotate(0deg);}
}

/* Core */

.core{
animation:
pulse 2.5s ease-in-out infinite,
colorShiftFill 8s ease-in-out infinite;
}

@keyframes pulse{
0%,100%{
r:18;
opacity:.7;
}
50%{
r:28;
opacity:1;
}
}

/* Color Cycle */

@keyframes colorShift{
0%{
stroke:#58a6ff;
}
33%{
stroke:#00ffff;
}
66%{
stroke:#a855f7;
}
100%{
stroke:#58a6ff;
}
}

@keyframes colorShiftFill{
0%{
fill:#58a6ff;
}
33%{
fill:#00ffff;
}
66%{
fill:#a855f7;
}
100%{
fill:#58a6ff;
}
}

/* Energy Sparks */

.spark{
animation:flicker 1.5s infinite;
}

@keyframes flicker{
0%,100%{
opacity:.2;
}
50%{
opacity:1;
}
}

</style>

<rect width="100%" height="100%" class="background"/>

<!-- Outer Rings -->

<circle cx="600" cy="160" r="100" class="ring1"/>
<circle cx="600" cy="160" r="75" class="ring2"/>
<circle cx="600" cy="160" r="50" class="ring3"/>

<!-- Energy Arms -->

<line x1="600" y1="50" x2="600" y2="95" class="ring2"/>
<line x1="600" y1="225" x2="600" y2="270" class="ring2"/>

<line x1="490" y1="160" x2="535" y2="160" class="ring2"/>
<line x1="665" y1="160" x2="710" y2="160" class="ring2"/>

<line x1="525" y1="85" x2="555" y2="115" class="ring3"/>
<line x1="645" y1="205" x2="675" y2="235" class="ring3"/>

<line x1="525" y1="235" x2="555" y2="205" class="ring3"/>
<line x1="645" y1="115" x2="675" y2="85" class="ring3"/>

<!-- Core -->

<circle cx="600" cy="160" r="22" class="core"/>

<!-- Energy Sparks -->

<circle cx="600" cy="60" r="4" class="spark core"/>
<circle cx="700" cy="160" r="4" class="spark core"/>
<circle cx="600" cy="260" r="4" class="spark core"/>
<circle cx="500" cy="160" r="4" class="spark core"/>

</svg>

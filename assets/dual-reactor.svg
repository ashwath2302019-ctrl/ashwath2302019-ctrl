<svg width="1200" height="320" xmlns="http://www.w3.org/2000/svg">

<style>

.background{
fill:#0d1117;
}

/* Left Reactor */

.leftOuter{
fill:none;
stroke:#58a6ff;
stroke-width:3;
transform-origin:350px 160px;
animation:rotateCW 15s linear infinite;
}

.leftInner{
fill:none;
stroke:#00ffff;
stroke-width:2;
transform-origin:350px 160px;
animation:rotateCCW 10s linear infinite;
}

/* Right Reactor */

.rightOuter{
fill:none;
stroke:#a855f7;
stroke-width:3;
transform-origin:850px 160px;
animation:rotateCCW 15s linear infinite;
}

.rightInner{
fill:none;
stroke:#58a6ff;
stroke-width:2;
transform-origin:850px 160px;
animation:rotateCW 10s linear infinite;
}

/* Core */

.coreLeft{
fill:#58a6ff;
animation:corePulseLeft 2s ease-in-out infinite;
}

.coreRight{
fill:#a855f7;
animation:corePulseRight 2s ease-in-out infinite;
}

@keyframes corePulseLeft{
0%,100%{
r:18;
opacity:.7;
}
50%{
r:28;
opacity:1;
}
}

@keyframes corePulseRight{
0%,100%{
r:18;
opacity:.7;
}
50%{
r:28;
opacity:1;
}
}

/* Rotations */

@keyframes rotateCW{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

@keyframes rotateCCW{
from{transform:rotate(360deg);}
to{transform:rotate(0deg);}
}

/* Energy Beam */

.energy{
stroke:url(#beam);
stroke-width:6;
stroke-dasharray:20;
animation:flow 1s linear infinite;
}

@keyframes flow{
from{
stroke-dashoffset:40;
}
to{
stroke-dashoffset:0;
}
}

/* Moving Energy Packet */

.packet{
fill:#ffffff;
animation:travel 2.5s linear infinite;
}

@keyframes travel{
0%{
transform:translateX(0px);
}
100%{
transform:translateX(500px);
}
}

/* Labels */

.label{
fill:white;
font-family:'Segoe UI',sans-serif;
font-size:20px;
font-weight:bold;
letter-spacing:2px;
}

</style>

<defs>

<linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#58a6ff"/>
<stop offset="50%" stop-color="#00ffff"/>
<stop offset="100%" stop-color="#a855f7"/>
</linearGradient>

</defs>

<rect width="100%" height="100%" class="background"/>

<!-- Connection Beam -->

<line x1="430" y1="160"
      x2="770" y2="160"
      class="energy"/>

<circle cx="430" cy="160" r="4" class="packet"/>

<!-- Left Reactor -->

<circle cx="350" cy="160" r="80" class="leftOuter"/>
<circle cx="350" cy="160" r="55" class="leftInner"/>
<circle cx="350" cy="160" r="22" class="coreLeft"/>

<!-- Right Reactor -->

<circle cx="850" cy="160" r="80" class="rightOuter"/>
<circle cx="850" cy="160" r="55" class="rightInner"/>
<circle cx="850" cy="160" r="22" class="coreRight"/>

<!-- Energy Arms -->

<line x1="350" y1="80" x2="350" y2="105" class="leftInner"/>
<line x1="350" y1="215" x2="350" y2="240" class="leftInner"/>

<line x1="850" y1="80" x2="850" y2="105" class="rightInner"/>
<line x1="850" y1="215" x2="850" y2="240" class="rightInner"/>

<!-- Names -->

<text x="350"
      y="290"
      text-anchor="middle"
      class="label">
ASHWATH
</text>

<text x="850"
      y="290"
      text-anchor="middle"
      class="label">
PREMKUMAR
</text>

</svg>
